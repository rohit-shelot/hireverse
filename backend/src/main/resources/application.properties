# Server Configuration
server.port=${PORT:8081}

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/campus_placement?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD_HERE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security Secrets
jwt.secret=CHOOSE_A_RANDOM_LONG_STRING_HERE
jwt.expiration=86400000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS_HERE
spring.mail.password=YOUR_GMAIL_APP_PASSWORD_HERE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Initial Admin Setup
admin.email=hireverse@gmail.com
admin.password=hireverse
