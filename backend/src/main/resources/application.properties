server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true


# JWT Secret for Authentication
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Email Configuration (for OTP MFA)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:YOUR_GMAIL_ADDRESS_HERE}
spring.mail.password=${SPRING_MAIL_PASSWORD:YOUR_GMAIL_APP_PASSWORD_HERE}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}
# Hibernate will auto-detect the PostgreSQL dialect

# Initial Admin Setup
admin.email=${ADMIN_EMAIL:YOUR_ADMIN_EMAIL_HERE}
admin.password=${ADMIN_PASSWORD:YOUR_ADMIN_PASSWORD_HERE}
