# Server Configuration
server.port=${PORT:8081}

# MySQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campus_placement?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:YOUR_DB_PASSWORD_HERE}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret for Authentication
jwt.secret=${JWT_SECRET:CHOOSE_A_RANDOM_LONG_STRING_HERE}
jwt.expiration=86400000

# Email Configuration (for OTP MFA)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:YOUR_GMAIL_ADDRESS_HERE}
spring.mail.password=${SPRING_MAIL_PASSWORD:YOUR_GMAIL_APP_PASSWORD_HERE}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Initial Admin Setup
admin.email=${ADMIN_EMAIL:YOUR_ADMIN_EMAIL_HERE}
admin.password=${ADMIN_PASSWORD:YOUR_ADMIN_PASSWORD_HERE}
