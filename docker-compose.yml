services:
  mysql_db:
    image: mysql:8.0
    container_name: campus_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: campus_placement
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - campus_network

  backend:
    build: ./backend
    container_name: campus_backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_db:3306/campus_placement?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - JWT_SECRET=your_very_long_random_jwt_secret_key_here
      - HIBERNATE_DDL_AUTO=update
      - SHOW_SQL=true
    depends_on:
      - mysql_db
    networks:
      - campus_network

  frontend:
    build: ./frontend
    container_name: campus_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8081
    depends_on:
      - backend
    networks:
      - campus_network

networks:
  campus_network:
    driver: bridge

volumes:
  mysql_data:
